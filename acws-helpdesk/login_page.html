<script>
  // Fallback: simple vanilla JS toggle for dropdowns so Status works
  // even if Bootstrap JS or jQuery are unavailable or blocked.
  (function(){
    try{
      document.addEventListener('click', function(ev){
        var toggle = ev.target.closest && ev.target.closest('.dropdown-toggle');
        if(toggle){
          ev.preventDefault();
          var parent = toggle.parentElement;
          var menu = parent.querySelector('.dropdown-menu');
          var isOpen = parent.classList.contains('show');
          // close any other open dropdowns
          document.querySelectorAll('.navbar .dropdown.show').forEach(function(d){
            if(d !== parent){ d.classList.remove('show'); var m = d.querySelector('.dropdown-menu'); if(m) m.classList.remove('show'); }
          });
          if(!isOpen){ parent.classList.add('show'); if(menu) menu.classList.add('show'); }
          else { parent.classList.remove('show'); if(menu) menu.classList.remove('show'); }
        } else {
          // clicked outside a toggle: close any open dropdowns
          if(!ev.target.closest || !ev.target.closest('.dropdown')){
            document.querySelectorAll('.navbar .dropdown.show').forEach(function(d){ d.classList.remove('show'); var m = d.querySelector('.dropdown-menu'); if(m) m.classList.remove('show'); });
          }
        }
      }, false);
    }catch(e){ console.error('vanilla dropdown fallback error', e); }
  })();
</script>
<script>
  // Debugging: log click targets to help diagnose broken buttons
  (function(){
    document.addEventListener('click', function(ev){
      try{
        var t = ev.target;
        var tag = t.tagName;
        var cls = t.className || '';
        var closest = (t.closest && t.closest('a,button')) ? t.closest('a,button') : null;
        console.log('DEBUG_CLICK:', {tag: tag, class: cls, closest: closest, defaultPrevented: ev.defaultPrevented});
      }catch(e){console.error('click-logger error', e)}
    }, true);
  })();
</script>
